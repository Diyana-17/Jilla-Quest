<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Geography Game</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <header>
        <h1>Jilla Quest</h1>
        <button id="show-instructions">?</button>
    </header>
    <main>
        <div id="main-flex">
            <section id="map-section">
                <div id="map"></div>
            </section>
            <section id="side-section">
                <section id="feedback-section">
                    <div id="guess-history"></div>
                    <div id="last-feedback"></div>
                    <div id="game-stats"></div>
                </section>
                <section id="input-section">
                    <input type="text" id="district-input" placeholder="Type district name..." autocomplete="off">
                    <button id="guess-btn">Guess</button>
                    <button id="reveal-btn">Reveal Answer</button>
                    <button id="reload-btn">New Game</button>
                    <div id="autocomplete-list"></div>
                    <label style="margin-top:0.5rem;align-self:flex-start;font-size:0.98rem;">
                      <input type="checkbox" id="zoom-toggle" checked style="margin-right:0.4em;"> Zoom to guess on map
                    </label>
                    <label style="margin-top:0.2rem;align-self:flex-start;font-size:0.98rem;">
                      <input type="checkbox" id="hint-toggle" style="margin-right:0.4em;"> Show direction hint
                    </label>
                </section>
            </section>
        </div>
    </main>
    <div id="modal" class="hidden">
        <div id="modal-content">
            <span id="close-modal">&times;</span>
            <h2>How to Play</h2>
            <p>Guess the hidden district of Nepal! Enter a district name and get feedback on your guess. Use the map and hints to find the target district. Good luck!</p>
        </div>
    </div>
    <div id="guess-modal" class="hidden">
      <div id="guess-modal-content">
        <span id="close-guess-modal">&times;</span>
        <div id="guess-modal-body"></div>
      </div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
